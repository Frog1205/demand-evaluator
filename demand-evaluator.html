<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>需求评估助手</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f6f1;
  --bg-warm: #f3f0e8;
  --bg-card: #ffffff;
  --bg-card-hover: #fefefe;
  --bg-input: #f5f3ed;
  --border: rgba(0,0,0,0.07);
  --border-hover: rgba(0,0,0,0.12);
  --border-focus: rgba(79,70,187,0.3);
  --text: #2c2a28;
  --text-secondary: #6b6862;
  --text-tertiary: #a09d96;
  --accent: #4f46bb;
  --accent-light: #6c63d0;
  --accent-soft: rgba(79,70,187,0.08);
  --accent-softer: rgba(79,70,187,0.04);
  --accent-glow: rgba(79,70,187,0.15);
  --green: #1a8c6a;
  --green-bg: #e8f5ef;
  --green-text: #15734f;
  --amber: #b07d18;
  --amber-bg: #fdf3dc;
  --amber-text: #8a6210;
  --red: #c0452a;
  --red-bg: #fce8e4;
  --red-text: #9c3520;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.05), 0 1px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.06);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --font: 'DM Sans', 'Noto Sans SC', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.page {
  max-width: 680px; margin: 0 auto;
  padding: 2.5rem 1.5rem;
}

/* ─── Header ─── */
.header { margin-bottom: 2.5rem; text-align: center; }
.header-icon {
  width: 56px; height: 56px; border-radius: 16px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
  display: inline-flex; align-items: center; justify-content: center;
  margin-bottom: 1rem;
  box-shadow: 0 6px 24px var(--accent-glow);
}
.header-icon svg { width: 28px; height: 28px; }
.header h1 {
  font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
  color: var(--text); margin-bottom: 6px;
}
.header p { font-size: 14px; color: var(--text-tertiary); font-weight: 400; }

/* ─── Settings ─── */
.settings-bar {
  display: flex; align-items: center; justify-content: flex-end;
  margin-bottom: 1.25rem;
}
.settings-btn {
  font-size: 13px; color: var(--text-tertiary); cursor: pointer;
  border: 1px solid var(--border); background: var(--bg-card);
  padding: 6px 14px; border-radius: 99px; font-family: var(--font);
  transition: all 0.2s; box-shadow: var(--shadow-sm);
}
.settings-btn:hover { color: var(--text-secondary); border-color: var(--border-hover); }

.settings-panel {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.5rem;
  margin-bottom: 1.5rem; display: none;
  box-shadow: var(--shadow-md);
  animation: slideDown 0.25s ease;
}
.settings-panel.show { display: block; }
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.setting-row { margin-bottom: 16px; }
.setting-row:last-child { margin-bottom: 0; }
.setting-label {
  font-size: 11px; font-weight: 600; color: var(--text-tertiary);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 6px; display: block;
}
.setting-input {
  width: 100%; font-size: 13px; padding: 10px 12px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-input); color: var(--text); outline: none;
  font-family: var(--font-mono); transition: all 0.2s;
}
.setting-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.setting-hint { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }

.provider-tabs { display: flex; gap: 6px; }
.provider-tab {
  font-size: 12px; font-weight: 500; font-family: var(--font);
  padding: 7px 14px; border: 1px solid var(--border);
  border-radius: 99px; cursor: pointer;
  background: var(--bg-input); color: var(--text-tertiary);
  transition: all 0.2s;
}
.provider-tab:hover { color: var(--text-secondary); border-color: var(--border-hover); }
.provider-tab.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent); box-shadow: 0 2px 12px var(--accent-glow);
}

/* ─── Steps ─── */
.step-indicator {
  display: flex; align-items: center; justify-content: center;
  gap: 0; margin-bottom: 2rem;
}
.step {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--text-tertiary); font-weight: 500;
  transition: all 0.3s;
}
.step-num {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
  border: 2px solid var(--border); color: var(--text-tertiary);
  background: var(--bg-card);
  transition: all 0.3s;
}
.step.active .step-num {
  background: var(--accent); border-color: var(--accent);
  color: #fff; box-shadow: 0 2px 12px var(--accent-glow);
}
.step.active { color: var(--text); }
.step-line {
  width: 48px; height: 2px; background: var(--border);
  margin: 0 12px; border-radius: 1px; transition: background 0.3s;
}
.step-line.active { background: var(--accent); }

/* ─── Cards ─── */
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.5rem;
  margin-bottom: 1rem; box-shadow: var(--shadow-sm);
  transition: all 0.2s;
}
.card:hover { box-shadow: var(--shadow-md); }
.card-title {
  font-size: 11px; font-weight: 600; color: var(--text-tertiary);
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.card-title::before {
  content: ''; width: 3px; height: 14px;
  border-radius: 2px; background: var(--accent);
}

/* ─── Textarea ─── */
textarea {
  width: 100%; min-height: 140px; font-size: 15px; line-height: 1.7;
  font-family: var(--font); color: var(--text);
  background: transparent; border: none; outline: none; resize: vertical;
}
textarea::placeholder { color: var(--text-tertiary); }

/* ─── Buttons ─── */
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
button {
  font-size: 14px; font-weight: 500; font-family: var(--font);
  cursor: pointer; border-radius: var(--radius-sm);
  padding: 10px 24px; border: 1px solid var(--border);
  background: var(--bg-card); color: var(--text-secondary);
  transition: all 0.2s; box-shadow: var(--shadow-sm);
}
button:hover { border-color: var(--border-hover); color: var(--text); box-shadow: var(--shadow-md); }
button:active { transform: scale(0.97); box-shadow: none; }
button.primary {
  background: var(--accent); color: #fff; border: none;
  box-shadow: 0 4px 16px var(--accent-glow);
}
button.primary:hover { background: var(--accent-light); box-shadow: 0 6px 24px var(--accent-glow); transform: translateY(-1px); }
button.primary:active { transform: scale(0.97) translateY(0); }
button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

/* ─── Form ─── */
.question-item { margin-bottom: 16px; }
.question-item:last-child { margin-bottom: 0; }
.question-text {
  font-size: 14px; color: var(--text); margin-bottom: 8px;
  line-height: 1.6; font-weight: 500;
}
.answer-input {
  width: 100%; font-size: 14px; padding: 10px 14px;
  font-family: var(--font); color: var(--text);
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius-sm); outline: none; transition: all 0.2s;
}
.answer-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.answer-input::placeholder { color: var(--text-tertiary); }

/* ─── Results ─── */
.result-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px; margin-bottom: 1rem;
}
@media (max-width: 540px) { .result-grid { grid-template-columns: 1fr 1fr; } }

.metric-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.1rem 1rem;
  text-align: center; position: relative; overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.metric-card::after {
  content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
  height: 3px; border-radius: 3px 3px 0 0;
}
.metric-card.good { background: var(--green-bg); border-color: rgba(26,140,106,0.12); }
.metric-card.good::after { background: var(--green); }
.metric-card.warn { background: var(--amber-bg); border-color: rgba(176,125,24,0.12); }
.metric-card.warn::after { background: var(--amber); }
.metric-card.bad { background: var(--red-bg); border-color: rgba(192,69,42,0.12); }
.metric-card.bad::after { background: var(--red); }

.metric-label {
  font-size: 11px; font-weight: 600; color: var(--text-tertiary);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
}
.metric-value { font-size: 28px; font-weight: 700; }
.metric-value.good { color: var(--green-text); }
.metric-value.warn { color: var(--amber-text); }
.metric-value.bad { color: var(--red-text); }

/* ─── Tags ─── */
.tag {
  display: inline-flex; align-items: center;
  font-size: 12px; font-weight: 500; padding: 5px 12px;
  border-radius: 99px; margin-right: 6px; margin-bottom: 6px;
}
.tag.green { background: var(--green-bg); color: var(--green-text); }
.tag.amber { background: var(--amber-bg); color: var(--amber-text); }
.tag.red { background: var(--red-bg); color: var(--red-text); }

.verdict-badge {
  display: inline-flex; align-items: center;
  font-size: 16px; font-weight: 700; padding: 6px 18px;
  border-radius: 99px;
}
.verdict-badge.green { background: var(--green-bg); color: var(--green-text); border: 1px solid rgba(26,140,106,0.15); }
.verdict-badge.amber { background: var(--amber-bg); color: var(--amber-text); border: 1px solid rgba(176,125,24,0.15); }
.verdict-badge.red { background: var(--red-bg); color: var(--red-text); border: 1px solid rgba(192,69,42,0.15); }

.result-detail {
  font-size: 14px; color: var(--text-secondary); line-height: 1.8; white-space: pre-wrap;
}

/* ─── Loading ─── */
.loading {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 3rem 0;
}
.loading-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); animation: bounce 1.4s infinite ease-in-out;
}
.loading-dot:nth-child(1) { animation-delay: -0.32s; }
.loading-dot:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}
.loading-text { font-size: 14px; color: var(--text-tertiary); margin-left: 8px; }

.hidden { display: none; }

/* ─── Section dividers ─── */
.section-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 1.5rem 0 1rem;
}
.section-divider::before, .section-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.section-divider span {
  font-size: 12px; font-weight: 600; color: var(--accent);
  text-transform: uppercase; letter-spacing: 1.2px; white-space: nowrap;
}

/* ─── Sub items in cards ─── */
.sub-item { margin-bottom: 12px; }
.sub-item:last-child { margin-bottom: 0; }
.sub-label {
  font-size: 11px; font-weight: 600; color: var(--text-tertiary);
  text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px;
}
.sub-value { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }
.sub-highlight {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 15px; font-weight: 600; color: var(--text);
}
.potential-badge {
  display: inline-flex; padding: 3px 10px; border-radius: 99px;
  font-size: 12px; font-weight: 600;
}
.potential-badge.high { background: var(--green-bg); color: var(--green-text); }
.potential-badge.mid { background: var(--amber-bg); color: var(--amber-text); }
.potential-badge.low { background: var(--red-bg); color: var(--red-text); }

.type-tag {
  display: inline-flex; padding: 4px 12px; border-radius: 99px;
  font-size: 12px; font-weight: 500;
  background: var(--accent-soft); color: var(--accent);
  border: 1px solid rgba(79,70,187,0.12);
}

/* ─── Footer ─── */
.footer {
  text-align: center; font-size: 12px; color: var(--text-tertiary);
  margin-top: 3rem; padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}

/* ─── Toast ─── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #fff; padding: 10px 24px;
  border-radius: 99px; font-size: 13px; font-weight: 500;
  box-shadow: 0 8px 32px var(--accent-glow); z-index: 999;
  font-family: var(--font); animation: toastIn 0.3s ease;
}
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(12px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

/* ─── Animations ─── */
.fade-in { animation: fadeIn 0.35s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 480px) {
  .page { padding: 1.5rem 1rem; }
  .header h1 { font-size: 22px; }
  .step-line { width: 28px; margin: 0 8px; }
}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h1>需求评估助手</h1>
    <p>AI 驱动的业务需求分析 · 判断真伪 · 评估交付</p>
  </div>

  <div class="settings-bar">
    <button class="settings-btn" onclick="toggleSettings()">⚙ API 配置</button>
  </div>
  <div class="settings-panel" id="settings-panel">
    <div class="setting-row">
      <span class="setting-label">服务商</span>
      <div class="provider-tabs">
        <button class="provider-tab active" data-provider="openai" onclick="switchProvider('openai')">DeepSeek / OpenAI</button>
        <button class="provider-tab" data-provider="anthropic" onclick="switchProvider('anthropic')">Anthropic</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">API 地址</span>
      <input class="setting-input" id="api-url" value="https://api.deepseek.com/chat/completions" />
      <div class="setting-hint" id="url-hint">支持 DeepSeek、OpenAI、Gemini、Grok 等兼容接口</div>
    </div>
    <div class="setting-row">
      <span class="setting-label">API Key</span>
      <input class="setting-input" id="api-key" type="password" placeholder="sk-..." />
      <div class="setting-hint">仅存于本地浏览器，不上传任何服务器</div>
    </div>
    <div class="setting-row">
      <span class="setting-label">模型</span>
      <input class="setting-input" id="api-model" value="deepseek-chat" />
      <div class="setting-hint" id="model-hint">deepseek-chat / gpt-4o / gemini-2.5-flash / grok-4</div>
    </div>
    <div class="btn-row" style="margin-top:16px;">
      <button class="primary" onclick="saveSettings()">保存配置</button>
    </div>
  </div>

  <div class="step-indicator">
    <div class="step active" id="step1-label"><span class="step-num">1</span><span>描述需求</span></div>
    <div class="step-line" id="line1"></div>
    <div class="step" id="step2-label"><span class="step-num">2</span><span>补充信息</span></div>
    <div class="step-line" id="line2"></div>
    <div class="step" id="step3-label"><span class="step-num">3</span><span>评估结果</span></div>
  </div>

  <div id="step1" class="fade-in">
    <div class="card">
      <textarea id="demand-input" placeholder="描述客户的需求，或直接粘贴客户原话&#10;&#10;例如：我们想做一个 AI 客服系统，能自动回复用户问题，接入我们的产品文档和历史工单数据，预算大概 3-5 万..."></textarea>
    </div>
    <div class="btn-row">
      <button class="primary" onclick="startEval()">开始评估</button>
      <button onclick="document.getElementById('demand-input').value=''">清空</button>
    </div>
  </div>

  <div id="step2" class="hidden">
    <div class="card" id="questions-container">
      <div class="card-title">关键信息确认</div>
      <div id="questions-list"></div>
    </div>
    <div class="btn-row">
      <button class="primary" onclick="submitAnswers()">提交评估</button>
      <button onclick="goBack()">返回修改</button>
    </div>
  </div>

  <div id="step3" class="hidden">
    <div id="loading" class="loading hidden">
      <div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>
      <span class="loading-text">正在深度评估需求...</span>
    </div>
    <div id="result-container"></div>
  </div>

  <div class="footer">需求评估助手 · 本地运行 · 数据不上传</div>
</div>

<script>
let currentDemand='', currentQuestions=[], currentProvider='openai';

function switchProvider(p) {
  currentProvider = p;
  document.querySelectorAll('.provider-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-provider="${p}"]`).classList.add('active');
  const u=document.getElementById('api-url'), uh=document.getElementById('url-hint'),
        m=document.getElementById('api-model'), mh=document.getElementById('model-hint');
  if (p==='anthropic') {
    u.value='https://api.anthropic.com/v1/messages'; uh.textContent='Anthropic Claude API';
    m.value='claude-sonnet-4-20250514'; mh.textContent='claude-sonnet-4-20250514 / claude-haiku-4-5-20251001';
  } else {
    u.value='https://api.deepseek.com/chat/completions'; uh.textContent='支持 DeepSeek、OpenAI、Gemini、Grok 等兼容接口';
    m.value='deepseek-chat'; mh.textContent='deepseek-chat / gpt-4o / gemini-2.5-flash / grok-4';
  }
}

function toggleSettings() { document.getElementById('settings-panel').classList.toggle('show'); }

function showToast(msg) {
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); },2000);
}

function saveSettings() {
  const u=document.getElementById('api-url').value.trim(),
        k=document.getElementById('api-key').value.trim(),
        m=document.getElementById('api-model').value.trim();
  if(u) localStorage.setItem('eval_api_url',u);
  if(k) localStorage.setItem('eval_api_key',k);
  if(m) localStorage.setItem('eval_api_model',m);
  localStorage.setItem('eval_api_provider',currentProvider);
  document.getElementById('settings-panel').classList.remove('show');
  showToast('配置已保存');
}

function loadSettings() {
  const u=localStorage.getItem('eval_api_url'), k=localStorage.getItem('eval_api_key'),
        m=localStorage.getItem('eval_api_model'), p=localStorage.getItem('eval_api_provider');
  if(u) document.getElementById('api-url').value=u;
  if(k) document.getElementById('api-key').value=k;
  if(m) document.getElementById('api-model').value=m;
  if(p) { currentProvider=p; switchProvider(p); }
}

function getConfig() {
  return { provider:currentProvider, url:document.getElementById('api-url').value.trim(),
    key:document.getElementById('api-key').value.trim(), model:document.getElementById('api-model').value.trim() };
}

function isAnthropicAPI(c) { return c.provider==='anthropic'||c.url.includes('anthropic.com'); }

async function callLLM(messages, systemPrompt) {
  const c=getConfig();
  if(!c.key) { showToast('请先配置 API Key'); toggleSettings(); throw new Error('No API key'); }
  const useA=isAnthropicAPI(c);
  let resp;
  if(useA) {
    resp=await fetch(c.url||'https://api.anthropic.com/v1/messages', { method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':c.key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:c.model||'claude-sonnet-4-20250514',max_tokens:3000,system:systemPrompt,messages})
    });
  } else {
    resp=await fetch(c.url||'https://api.deepseek.com/chat/completions', { method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${c.key}`},
      body:JSON.stringify({model:c.model||'deepseek-chat',messages:[{role:'system',content:systemPrompt},...messages],max_tokens:3000,temperature:0.3})
    });
  }
  if(!resp.ok) { const e=await resp.text(); throw new Error(`${resp.status} - ${e}`); }
  const d=await resp.json();
  return useA ? d.content.map(i=>i.text||'').join('') : d.choices[0].message.content;
}

async function startEval() {
  const demand=document.getElementById('demand-input').value.trim();
  if(!demand) { showToast('请先输入需求描述'); return; }
  currentDemand=demand; showStep(2);
  const qL=document.getElementById('questions-list');
  qL.innerHTML='<div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div><span class="loading-text">生成追问中...</span></div>';
  const sp=`你是一个 AI 业务需求分析专家。根据客户描述的需求，生成 3-4 个关键追问问题，帮助判断需求真实性和可交付性。
只返回 JSON 数组，格式：[{"id":"q1","question":"问题内容","placeholder":"回答示例"}]
问题应覆盖：预算范围和付费意愿、时间要求和紧迫度、核心业务痛点、已有系统/数据/技术基础、期望效果和成功标准、决策人是否已立项。问题要具体直接。不要有任何额外文字，只返回 JSON。`;
  try {
    const raw=await callLLM([{role:'user',content:`客户需求：${demand}`}],sp);
    currentQuestions=JSON.parse(raw.replace(/```json|```/g,'').trim());
    qL.innerHTML='';
    currentQuestions.forEach(q=>{
      const d=document.createElement('div'); d.className='question-item';
      d.innerHTML=`<div class="question-text">${q.question}</div><input class="answer-input" id="ans-${q.id}" placeholder="${q.placeholder||'选填'}" />`;
      qL.appendChild(d);
    });
  } catch(e) {
    if(e.message==='No API key') return;
    qL.innerHTML=`<div style="font-size:14px;color:var(--text-tertiary);line-height:1.6">生成失败：${e.message}<br>可直接点击"提交评估"跳过</div>`;
    currentQuestions=[];
  }
}

async function submitAnswers() {
  showStep(3);
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('result-container').innerHTML='';
  const ans=currentQuestions.map(q=>{const v=document.getElementById('ans-'+q.id)?.value||'';return v?`${q.question}\n答：${v}`:'';}).filter(Boolean).join('\n\n');
  const sp=`你是 AI 业务需求评估专家，帮助独立开发者/小团队判断是否值得接一个 AI 项目需求。

评估维度：
1. 真实需求度(0-100)：客户是否有真实痛点、明确预算、决策能力
2. 可交付度(0-100)：技术可行性、工作量可控性、风险水平
3. 变现评级：高/中/低
4. 综合建议：接/谨慎接/不接
5. 交付预算评估：预估交付周期、预算范围、可能风险、需要什么样的人才来交付
6. 项目潜力评估：项目属于什么类型、市场潜力、是否有长期价值

返回JSON（只返回JSON，不要多余文字）：
{
  "realScore": 数字,
  "realReason": "1-2句",
  "deliverScore": 数字,
  "deliverReason": "1-2句",
  "moneyRating": "高|中|低",
  "verdict": "接|谨慎接|不接",
  "verdictReason": "2-3句综合判断",
  "risks": ["风险1","风险2"],
  "deliverMethod": "3-4句具体交付方案",
  "pricing": "1-2句报价建议",
  "nextStep": "2-3句可执行行动",
  "budgetEval": {
    "timeline": "预估交付周期，如1-2周、1个月等",
    "budgetRange": "建议预算区间，如1.5万-3万",
    "budgetRisks": ["预算相关风险1","预算相关风险2"],
    "talentNeeded": "需要什么样的人才来交付，技术栈和能力要求（2-3句）"
  },
  "projectEval": {
    "projectType": "项目类型标签，如：AI客服/数据分析/内容生成/智能体/自动化流程",
    "marketPotential": "高|中|低",
    "potentialReason": "市场潜力分析（2-3句）",
    "longTermValue": "是否有长期合作或产品化的可能（1-2句）"
  }
}`;
  try {
    const raw=await callLLM([{role:'user',content:`需求：${currentDemand}\n\n补充：\n${ans||'（未补充）'}`}],sp);
    renderResult(JSON.parse(raw.replace(/```json|```/g,'').trim()));
  } catch(e) {
    if(e.message==='No API key') return;
    document.getElementById('result-container').innerHTML=`<div class="card"><div style="color:var(--text-tertiary)">评估失败：${e.message}</div></div>`;
  }
  document.getElementById('loading').classList.add('hidden');
}

function sc(n) { return n>=70?'good':n>=40?'warn':'bad'; }

function renderResult(r) {
  const c=document.getElementById('result-container');
  const vc=r.verdict==='接'?'green':r.verdict==='谨慎接'?'amber':'red';
  const risks=(r.risks||[]).map(x=>`<span class="tag amber">${x}</span>`).join('');
  const be=r.budgetEval||{};
  const pe=r.projectEval||{};
  const budgetRisks=(be.budgetRisks||[]).map(x=>`<span class="tag red">${x}</span>`).join('');
  const potClass=pe.marketPotential==='高'?'high':pe.marketPotential==='中'?'mid':'low';

  c.innerHTML=`<div class="fade-in">
    <div class="result-grid">
      <div class="metric-card ${sc(r.realScore)}"><div class="metric-label">真实度</div><div class="metric-value ${sc(r.realScore)}">${r.realScore}</div></div>
      <div class="metric-card ${sc(r.deliverScore)}"><div class="metric-label">可交付</div><div class="metric-value ${sc(r.deliverScore)}">${r.deliverScore}</div></div>
      <div class="metric-card ${r.moneyRating==='高'?'good':r.moneyRating==='中'?'warn':'bad'}"><div class="metric-label">变现</div><div class="metric-value ${r.moneyRating==='高'?'good':r.moneyRating==='中'?'warn':'bad'}">${r.moneyRating}</div></div>
      <div class="metric-card ${vc}"><div class="metric-label">建议</div><div style="margin-top:4px;"><span class="verdict-badge ${vc}">${r.verdict}</span></div></div>
    </div>

    <div class="card"><div class="card-title">综合判断</div><div class="result-detail">${r.verdictReason||''}</div></div>

    ${r.realReason||r.deliverReason?`<div class="card"><div class="card-title">评分说明</div><div class="result-detail">${r.realReason?'真实度：'+r.realReason:''}${r.realReason&&r.deliverReason?'\n':''}${r.deliverReason?'可交付：'+r.deliverReason:''}</div></div>`:''}

    ${risks?`<div class="card"><div class="card-title">风险预警</div><div style="padding-top:4px;">${risks}</div></div>`:''}

    <div class="section-divider"><span>交付预算评估</span></div>

    <div class="card">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="sub-item">
          <div class="sub-label">预估周期</div>
          <div class="sub-highlight">${be.timeline||'待评估'}</div>
        </div>
        <div class="sub-item">
          <div class="sub-label">预算区间</div>
          <div class="sub-highlight">${be.budgetRange||'待评估'}</div>
        </div>
      </div>
      ${be.talentNeeded?`<div class="sub-item" style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
        <div class="sub-label">所需人才</div>
        <div class="sub-value">${be.talentNeeded}</div>
      </div>`:''}
      ${budgetRisks?`<div class="sub-item" style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
        <div class="sub-label">预算风险</div>
        <div style="padding-top:4px;">${budgetRisks}</div>
      </div>`:''}
    </div>

    <div class="section-divider"><span>项目潜力评估</span></div>

    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        ${pe.projectType?`<span class="type-tag">${pe.projectType}</span>`:''}
        ${pe.marketPotential?`<span class="potential-badge ${potClass}">市场潜力：${pe.marketPotential}</span>`:''}
      </div>
      ${pe.potentialReason?`<div class="sub-item">
        <div class="sub-label">潜力分析</div>
        <div class="sub-value">${pe.potentialReason}</div>
      </div>`:''}
      ${pe.longTermValue?`<div class="sub-item" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
        <div class="sub-label">长期价值</div>
        <div class="sub-value">${pe.longTermValue}</div>
      </div>`:''}
    </div>

    <div class="section-divider"><span>行动建议</span></div>

    <div class="card"><div class="card-title">交付方案</div><div class="result-detail">${r.deliverMethod||''}</div></div>
    ${r.pricing?`<div class="card"><div class="card-title">报价策略</div><div class="result-detail">${r.pricing}</div></div>`:''}
    <div class="card"><div class="card-title">下一步行动</div><div class="result-detail">${r.nextStep||''}</div></div>

    <div class="btn-row" style="margin-top:1.25rem;"><button class="primary" onclick="resetAll()">评估新需求</button></div>
  </div>`;
}

function showStep(n) {
  ['step1','step2','step3'].forEach(id=>{const el=document.getElementById(id);el.classList.add('hidden');el.classList.remove('fade-in');});
  const t=document.getElementById('step'+n); t.classList.remove('hidden'); t.classList.add('fade-in');
  for(let i=1;i<=3;i++){const l=document.getElementById('step'+i+'-label');if(i<=n)l.classList.add('active');else l.classList.remove('active');}
  if(document.getElementById('line1')) document.getElementById('line1').classList.toggle('active',n>=2);
  if(document.getElementById('line2')) document.getElementById('line2').classList.toggle('active',n>=3);
}

function goBack() { showStep(1); }
function resetAll() { currentDemand='';currentQuestions=[];document.getElementById('demand-input').value='';document.getElementById('result-container').innerHTML='';showStep(1); }
loadSettings();
</script>
</body>
</html>
